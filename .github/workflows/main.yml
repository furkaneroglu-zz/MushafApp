name: "Mushaf iOS Derleme"

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-15 
    steps:
      - uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Xcode 16.1 Seç
        run: sudo xcode-select -s /Applications/Xcode_16.1.app

      - name: Flutter Hazırla
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Kütüphaneleri Yükle
        run: pip install flet g4f requests

      - name: iOS Uygulamasını Derle (IPA Değil)
        run: |
          # Flet'in içindeki Flutter motoruna "Sadece uygulamayı inşa et, paketlemeye karışma" diyoruz
          flutter build ios --release --no-codesign

      - name: Manuel IPA Paketleme (Hacker Hamlesi)
        run: |
          # Derlenen dosyayı alıp el yordamıyla IPA (aslında bir ziptir) haline getiriyoruz
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r Mushaf_v0.02.ipa Payload

      - name: Dosyayı Paylaş
        uses: actions/upload-artifact@v4
        with:
          name: Mushaf-iOS-Sideload-Paketi
          path: Mushaf_v0.02.ipa
