name: "Mushaf iOS Derleme"

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-14 # En stabil Mac sürümüne sabitledik
    steps:
      - uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Flutter Hazırla
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Kütüphaneleri Yükle
        run: pip install flet g4f requests

      - name: Hata Yaması (Connectivity Fix)
        run: |
          # Hata veren kütüphaneyi sorunsuz olan 6.0.5 sürümüne zorluyoruz
          flutter pub add connectivity_plus:6.0.5

      - name: iOS Paketi Yap (IPA)
        run: |
          flet build ipa --flutter-build-args="--no-codesign"

      - name: Dosyayı Hazırla
        uses: actions/upload-artifact@v4
        with:
          name: Mushaf-iOS-Paketi
          path: build/ipa/*.ipa
