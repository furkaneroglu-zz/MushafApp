name: "Mushaf iOS Derleme"

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-15 
    steps:
      - uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Xcode 16.1 Seç
        run: sudo xcode-select -s /Applications/Xcode_16.1.app

      - name: Flutter Hazırla
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Kütüphaneleri Yükle
        run: pip install flet g4f requests

      - name: Truva Atı Sistemini Kur (Hacker Hamlesi)
        run: |
          GERCEK_FLUTTER=$(which flutter)
          mkdir -p /tmp/fake_bin
          
          # Sahte kuryemizi yazıyoruz
          cat << 'EOF' > /tmp/fake_bin/flutter
          #!/bin/bash
          if [[ "$*" == *"build ipa"* ]]; then
            echo "🐎 Truva Atı devrede: Apple komutu yakalandı!"
            GERCEK_FLUTTER_PATH="REPLACE_ME"
            # Kimlik sormayan gizli komutu çalıştır
            $GERCEK_FLUTTER_PATH build ios --release --no-codesign
            
            echo "📦 Kendi IPA paketimizi yapıp Flet'e yutturuyoruz..."
            mkdir -p build/ios/ipa
            mkdir -p Payload
            cp -r build/ios/iphoneos/Runner.app Payload/
            zip -q -r build/ios/ipa/Mushaf_v0.02.ipa Payload
            exit 0
          else
            # Diğer normal komutlara dokunma
            GERCEK_FLUTTER_PATH="REPLACE_ME"
            $GERCEK_FLUTTER_PATH "$@"
          fi
          EOF
          
          # İçine gerçek flutter'ın yolunu gömüyoruz
          sed -i '' "s|REPLACE_ME|$GERCEK_FLUTTER|g" /tmp/fake_bin/flutter
          chmod +x /tmp/fake_bin/flutter
          
          # Robotun hafızasına bizim sahte kuryeyi birinci sıraya koyuyoruz
          echo "/tmp/fake_bin" >> $GITHUB_PATH

      - name: Flet ile Uygulamayı İnşa Et
        # Flet bu komutu Apple'a gönderdiğini sanacak ama bizim kuryeye verecek
        run: flet build ipa

      - name: IPA Dosyasını Teslim Et
        uses: actions/upload-artifact@v4
        with:
          name: Mushaf-iOS-Final-IPA
          path: build/ipa/*.ipa
