name: "Mushaf iOS Derleme"

on:
  workflow_dispatch: 

jobs:
  build:
    # En yeni Mac sürümünü (Sequoia) kullanıyoruz
    runs-on: macos-15 
    steps:
      - uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Xcode 16 Seç (En Yeni Sözlük)
        # O hata veren kelimeyi tanıyan tek sürüm bu, zorla seçtiriyoruz
        run: sudo xcode-select -s /Applications/Xcode_16.1.app

      - name: Flutter Hazırla
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Kütüphaneleri Yükle
        run: pip install flet g4f requests

      - name: iOS Paketi Yap (IPA)
        run: |
          # En güncel ve sade komut
          flet build ipa --flutter-build-args="--no-codesign"

      - name: Dosyayı Hazırla
        uses: actions/upload-artifact@v4
        with:
          name: Mushaf-iOS-Paketi
          path: build/ipa/*.ipa
