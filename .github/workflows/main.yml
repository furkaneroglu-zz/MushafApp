name: "Mushaf iOS Derleme"

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-14 # Stabil sürümde kalalım
    steps:
      - uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Flutter Hazırla
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Kütüphaneleri Yükle
        run: pip install flet g4f requests

      - name: Bağımlılıkları Önceden İndir
        run: |
          # Projeyi başlatmadan kütüphaneyi indiriyoruz ki ameliyat yapabilelim
          flutter pub cache add connectivity_plus:6.0.5

      - name: Cerrahi Müdahale (Hata Fix)
        run: |
          # Hata veren 'isUltraConstrained' satırını robotun hafızasından siliyoruz
          find /Users/runner/.pub-cache -name "PathMonitorConnectivityProvider.swift" -exec sed -i '' 's/path.isUltraConstrained/false/g' {} + || true

      - name: iOS Paketi Yap (IPA)
        run: |
          # Paketlemeyi başlatıyoruz
          flet build ipa --flutter-build-args="--no-codesign"

      - name: Dosyayı Hazırla
        uses: actions/upload-artifact@v4
        with:
          name: Mushaf-iOS-Paketi
          path: build/ipa/*.ipa
