name: "Mushaf iOS Derleme"

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Flutter Hazırla
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Kütüphaneleri Yükle
        run: pip install flet g4f requests

      - name: iOS Paketi Yap (IPA)
        run: |
          # Flet'e doğrudan ipa yapmasını ve imzalamayı Flutter tarafında atlamasını söylüyoruz
          flet build ipa --flutter-build-args="--no-codesign"

      - name: Dosyayı Hazırla
        uses: actions/upload-artifact@v4
        with:
          name: Mushaf-iOS-Paketi
          path: build/ipa/*.ipa
