name: "Mushaf iOS Derleme"

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-15 
    steps:
      - uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Xcode 16.1 Seç
        run: sudo xcode-select -s /Applications/Xcode_16.1.app

      - name: Flutter Hazırla
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Kütüphaneleri Yükle
        run: pip install flet g4f requests

      - name: İnşaatı Başlat (Hata Yok Sayılacak)
        run: |
          # Flet'in çalışma alanını kendi kontrolümüzde bir klasöre alıyoruz
          mkdir -p $GITHUB_WORKSPACE/gizli_mutfak
          export TMPDIR=$GITHUB_WORKSPACE/gizli_mutfak
          
          # Apple "Kimlik ver" diye hata verene kadar çalıştırıyoruz (|| true ile hatayı eziyoruz)
          flet build ipa --flutter-build-args="--no-codesign" || true

      - name: Dosyayı Çal ve IPA (Zip) Yap
        run: |
          # Apple paketlemeyi reddetse de, arka planda hazır olan uygulamayı buluyoruz
          APP_DOSYASI=$(find $GITHUB_WORKSPACE/gizli_mutfak -type d -name "*.app" | grep -v "Pods" | grep -v "Simulator" | head -n 1)
          
          echo "Buldum: $APP_DOSYASI"
          
          # Kendimiz manuel olarak IPA paketini yapıyoruz
          mkdir -p Payload
          cp -R "$APP_DOSYASI" Payload/
          zip -r Mushaf_v0.02.ipa Payload

      - name: IPA Dosyasını Teslim Et
        uses: actions/upload-artifact@v4
        with:
          name: Mushaf-iOS-Final-IPA
          path: Mushaf_v0.02.ipa
