name: "Mushaf iOS Derleme"

on:
  workflow_dispatch: 

jobs:
  build:
    # En güçlü ve güncel Mac sunucusu (M1 işlemcili)
    runs-on: macos-14 
    steps:
      - uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Xcode Seçimi (Kritik Hamle)
        # Hata veren Xcode 16 yerine, en stabil çalışan Xcode 15'i seçiyoruz
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Flutter Hazırla
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Kütüphaneleri Yükle
        run: pip install flet g4f requests

      - name: iOS Paketi Yap (IPA)
        run: |
          # En güvenli paketleme komutu
          flet build ipa --flutter-build-args="--no-codesign"

      - name: Dosyayı Hazırla
        uses: actions/upload-artifact@v4
        with:
          name: Mushaf-iOS-Paketi
          path: build/ipa/*.ipa
