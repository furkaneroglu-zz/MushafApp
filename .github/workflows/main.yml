name: "Mushaf iOS Derleme"

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-15 
    steps:
      - uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Xcode 16.1 Seç
        run: sudo xcode-select -s /Applications/Xcode_16.1.app

      - name: Flutter Hazırla
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Kütüphaneleri Yükle
        run: pip install flet g4f requests

      - name: Flet ile Uygulamayı İnşa Et
        # Bu adım sonunda 'Hata' verebilir ama dosyaları oluşturmuş olacak
        run: flet build ipa --flutter-build-args="--no-codesign" || true

      - name: Dosyayı Bul ve IPA Yap (Hacker Hamlesi)
        run: |
          # Flet'in oluşturduğu o gizli klasörü bulup içindeki uygulamayı çalıyoruz
          mkdir -p Payload
          find build/ipa -name "*.app" -exec cp -r {} Payload/ \;
          zip -r Mushaf_v0.02.ipa Payload

      - name: IPA Dosyasını Paylaş
        uses: actions/upload-artifact@v4
        with:
          name: Mushaf-v0.02-iPhone-Paketi
          path: Mushaf_v0.02.ipa
